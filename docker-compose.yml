version: '3.9'

services:

  postgres:
    image: postgres:16

    container_name: recommender_postgres

    restart: always

    environment:
      POSTGRES_DB: recommender_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .

    container_name: recommender_api

    depends_on:
      - postgres

    ports:
      - "8000:8000"

    env_file:
      - .env

volumes:
  postgres_data: